name: TokenMark Localization CI
description: Build, auto-translate and report TokenMark localization status.
inputs:
  lang:
    description: Target language
    required: false
    default: en
  provider:
    description: Translation provider: mock, identity, deepl, openai
    required: false
    default: mock
  commit:
    description: Commit locale changes back to the branch
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        python -m pip install -e .[server] || python -m pip install -e .
        tokenmark ci --lang "${{ inputs.lang }}" --provider "${{ inputs.provider }}" ${{ inputs.commit == 'true' && '--commit' || '' }}
